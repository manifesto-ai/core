name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install
      - run: pnpm build

      # React Storybook 빌드
      - name: Build React Storybook
        run: pnpm --filter @manifesto-ai/storybook-react build-storybook
        env:
          CI: true
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # Vue Storybook 빌드
      - name: Build Vue Storybook
        run: pnpm --filter @manifesto-ai/storybook-vue build-storybook
        env:
          CI: true
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # 통합 디렉토리 생성
      - name: Prepare deployment directory
        run: |
          mkdir -p ./pages
          mv ./apps/storybook-react/storybook-static ./pages/react
          mv ./apps/storybook-vue/storybook-static ./pages/vue
          # 랜딩 페이지 생성
          cat > ./pages/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Manifesto DSL Storybook</title>
            <style>
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
              }
              .container {
                text-align: center;
                padding: 3rem;
                background: white;
                border-radius: 16px;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
                max-width: 500px;
                width: 90%;
              }
              h1 {
                font-size: 2rem;
                color: #1a202c;
                margin-bottom: 0.5rem;
              }
              p {
                color: #718096;
                margin-bottom: 2rem;
              }
              .buttons {
                display: flex;
                gap: 1rem;
                justify-content: center;
                flex-wrap: wrap;
              }
              a {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                padding: 1rem 2rem;
                border-radius: 8px;
                text-decoration: none;
                font-weight: 600;
                transition: transform 0.2s, box-shadow 0.2s;
              }
              a:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.3);
              }
              .react {
                background: #61dafb;
                color: #20232a;
              }
              .vue {
                background: #42b883;
                color: white;
              }
              .icon {
                font-size: 1.5rem;
              }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>Manifesto DSL</h1>
              <p>Schema-driven UI Framework Storybook</p>
              <div class="buttons">
                <a href="./react/" class="react">
                  <span class="icon">⚛️</span>
                  React
                </a>
                <a href="./vue/" class="vue">
                  <span class="icon">💚</span>
                  Vue
                </a>
              </div>
            </div>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
