name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature!

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package should own this issue?
      options:
        - repo
        - core
        - host
        - sdk
        - compiler
        - lineage
        - governance
        - codegen
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? Is your feature request related to a problem?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or features you've considered

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context or screenshots about the feature request
